<div class="manage-page">
  <div class="page-header-bar">
    <div>
      <h1 class="page-title">Mesas</h1>
      <p class="page-subtitle">Adicione, remova e visualize o status das mesas</p>
    </div>
    <button (click)="openAddTableForm()" class="btn btn-primary">
      <lucide-angular [img]="Plus" [size]="18" [strokeWidth]="2"></lucide-angular>
      Adicionar Mesa
    </button>
  </div>

  <!-- Legend -->
  <div class="table-legend">
    <div class="legend-item">
      <div class="legend-dot legend-dot-free"></div>
      <span>Disponível</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot legend-dot-busy"></div>
      <span>Ocupada</span>
    </div>
  </div>

  <!-- Tables Grid -->
  <div class="cards-grid" style="grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));">
    <div
      *ngFor="let table of tables"
      (click)="handleTableClick(table)"
      class="table-status-card"
      [class.status-free]="table.status !== 'BUSY'"
      [class.status-busy]="table.status === 'BUSY'"
    >
      <button class="table-delete-btn" (click)="deleteTable(table.id, $event)">&times;</button>
      <div class="table-number-display">Mesa {{ table.number }}</div>
      <div class="table-status-label">{{ getStatusLabel(table.status) }}</div>

      <div *ngIf="table.status === 'BUSY' && table.tab" class="table-order-info">
        <div class="table-customer">{{ table.tab.customer_name || 'Sem nome' }}</div>
        <div class="table-cta">Ver comanda</div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="tables.length === 0" class="empty-state-card">
    <div class="empty-state-icon">
      <lucide-angular [img]="Plus" [size]="24" [strokeWidth]="1.5"></lucide-angular>
    </div>
    <p class="empty-state-title">Nenhuma mesa configurada</p>
    <p class="empty-state-text">Adicione mesas para começar a organizar o salão</p>
  </div>

  <!-- Add Table Modal -->
  <div *ngIf="showAddForm" class="modal-overlay" (click)="closeAddForm()">
    <div class="modal-card" (click)="$event.stopPropagation()">
      <div class="modal-card-header">
        <h3 class="modal-card-title">Adicionar Mesa</h3>
        <button class="btn-close-modal" (click)="closeAddForm()">&times;</button>
      </div>

      <form [formGroup]="tableForm" (ngSubmit)="onSubmit()" class="modal-card-body">
        <div class="form-field">
          <label class="form-label">Número da Mesa</label>
          <input type="number" formControlName="number" placeholder="Ex: 1, 2, 3..." class="input" />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" style="flex: 1;">Adicionar</button>
          <button type="button" (click)="closeAddForm()" class="btn btn-secondary" style="flex: 1;">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
</div>
