<div class="manage-page">
  <div class="page-header-bar">
    <div>
      <h1 class="page-title">Categorias</h1>
      <p class="page-subtitle">Organize seus produtos em categorias</p>
    </div>
    <button (click)="openForm()" class="btn btn-primary">
      <lucide-angular [img]="Plus" [size]="18" [strokeWidth]="2"></lucide-angular>
      Nova Categoria
    </button>
  </div>

  <!-- Form Modal -->
  <div *ngIf="showForm" class="modal-overlay" (click)="closeForm()">
    <div class="modal-card" (click)="$event.stopPropagation()">
      <div class="modal-card-header">
        <h3 class="modal-card-title">{{ editingId ? "Editar Categoria" : "Nova Categoria" }}</h3>
        <button class="btn-close-modal" (click)="closeForm()">&times;</button>
      </div>

      <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()" class="modal-card-body">
        <div class="form-field">
          <label class="form-label">Nome</label>
          <input type="text" formControlName="name" class="input" placeholder="Nome da categoria" />
        </div>

        <div class="form-field">
          <label class="form-label">Ícone</label>
          <div class="category-select">
            <div style="display: flex; align-items: center; gap: 0.5rem;">
              <div class="icon-preview">
                <span style="font-size: 1.5rem;">{{ categoryForm.value.icon || "🍽️" }}</span>
              </div>
              <button #iconToggleButton type="button" (click)="toggleIconPicker()" class="btn btn-secondary btn-sm">
                {{ showIconPicker ? "Fechar" : "Escolher" }}
              </button>
            </div>

            <div #iconPickerContainer *ngIf="showIconPicker" class="icon-picker-dropdown">
              <div class="icon-picker-grid">
                <button *ngFor="let icon of availableIcons" type="button" (mousedown)="selectIcon(icon)" class="icon-btn" [class.selected]="categoryForm.value.icon === icon">
                  {{ icon }}
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" style="flex: 1;">
            {{ editingId ? "Atualizar" : "Criar" }}
          </button>
          <button type="button" (click)="closeForm()" class="btn btn-secondary" style="flex: 1;">
            Cancelar
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Categories Grid -->
  <div class="cards-grid">
    <div *ngFor="let category of categories" class="grid-card">
      <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;">
        <span style="font-size: 2rem;" [innerHTML]="category.icon"></span>
        <h3 style="font-size: 1.0625rem; font-weight: 700; color: var(--gray-900); margin: 0;">{{ category.name }}</h3>
      </div>
      <div class="action-btns">
        <button (click)="editCategory(category)" class="btn btn-sm btn-secondary" style="flex: 1;">Editar</button>
        <button (click)="deleteCategory(category.id)" class="btn btn-sm btn-ghost" style="flex: 1; color: var(--danger-600);">Deletar</button>
      </div>
    </div>
  </div>

  <div *ngIf="!categories || categories.length === 0" class="empty-state-card">
    <div class="empty-state-icon">
      <lucide-angular [img]="Plus" [size]="24" [strokeWidth]="1.5"></lucide-angular>
    </div>
    <p class="empty-state-title">Nenhuma categoria cadastrada</p>
    <p class="empty-state-text">Crie categorias para organizar seus produtos</p>
  </div>
</div>
