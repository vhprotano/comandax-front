<div class="login-page">
  <div class="login-bg-pattern"></div>

  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <img
        src="assets/logo/branco-transparente.png"
        alt="ComandaX Logo"
        class="logo-img"
      />
    </div>

    <!-- Content -->
    <div class="login-body">
      @if (!loading) {
        <h2 class="login-welcome">Bem-vindo ao ComandaX</h2>
        <p class="login-subtitle">
          Gerencie suas comandas de forma simples e eficiente.
        </p>

        <div id="google-signin-button" class="google-btn-container"></div>

        <p class="login-hint">
          Ao entrar com Google, sua conta sera criada automaticamente caso ainda
          não possua uma.
        </p>

        <div *ngIf="error" class="login-error">
          <span class="error-dot"></span>
          <span>{{ error }}</span>
        </div>
      }

      @if (loading) {
        <div class="login-loading">
          <div class="login-spinner"></div>
          <p class="login-loading-text">Preparando seu acesso...</p>
          <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      }
    </div>
  </div>
</div>
