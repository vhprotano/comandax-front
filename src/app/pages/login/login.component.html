<div class="login-page">
  <div class="login-bg-pattern"></div>

  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <img src="assets/logo/branco-transparente.png" alt="ComandaX Logo" class="logo-img" />
    </div>

    <!-- Content -->
    <div class="login-body">
      @if (!loading) {
        <p class="login-instruction">Faça login com sua conta Google para continuar</p>

        <div id="google-signin-button" class="google-btn-container"></div>

        <div *ngIf="error" class="login-error">
          <span class="error-dot"></span>
          <span>{{ error }}</span>
        </div>
      }

      @if (loading) {
        <div class="login-loading">
          <div class="login-spinner"></div>
          <p class="login-loading-text">Preparando seu acesso...</p>
          <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      }
    </div>
  </div>
</div>
